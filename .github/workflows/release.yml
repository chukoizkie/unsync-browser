name: Build & Release

on:
  push:
    tags:
      - 'v*'        # triggers on v0.4.0, v1.0.0, etc.
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: out/make/deb/x64/*.deb
            name: Linux (.deb)
          - os: windows-latest
            platform: win32
            artifact: out/make/squirrel.windows/x64/*.exe
            name: Windows (.exe)
          - os: macos-latest
            platform: darwin
            artifact: out/make/zip/darwin/x64/*.zip
            name: macOS (.zip)

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libnss3 libxss1 \
            libasound2t64 libgbm-dev zip

      - name: Install dependencies
        run: npm ci

      - name: Make distributables
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsync-browser-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
